<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">

<title>BMI Calculator</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>

<h1>BMI Calculator</h1>

</header>

<main>

<input id="gewicht" placeholder="kg">

<input id="lengte" placeholder="cm">

<button onclick="bmi()">Bereken</button>

<h2 id="resultaat"></h2>

<script>

function bmi(){

let g=document.getElementById("gewicht").value;

let l=document.getElementById("lengte").value/100;

let uitkomst=(g/(l*l)).toFixed(1);

document.getElementById("resultaat").innerHTML="BMI: "+uitkomst;

}

</script>

</main>

</body>

</html>
