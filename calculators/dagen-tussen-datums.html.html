<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dagen tussen datums</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
<h1>Dagen tussen datums</h1>
</header>

<main>

<label>Begindatum</label>
<input type="date" id="start">

<label>Einddatum</label>
<input type="date" id="einde">

<button onclick="bereken()">Bereken</button>

<h2 id="uitkomst"></h2>

<script>
function bereken(){

let start=new Date(document.getElementById("start").value);
let einde=new Date(document.getElementById("einde").value);

let verschil=einde-start;

let dagen=Math.floor(verschil/(1000*60*60*24));

document.getElementById("uitkomst").innerHTML=
dagen+" dagen";

}
</script>

</main>

</body>
</html>
