<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Gewicht Omrekenen</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
<h1>Gewicht Omrekenen</h1>
</header>

<main>

<input type="number" id="kg" placeholder="Kilogram">

<button onclick="calc()">Bereken</button>

<h2 id="antwoord"></h2>

<script>

function calc(){

let kg=parseFloat(document.getElementById("kg").value);

document.getElementById("antwoord").innerHTML=

(kg*1000).toFixed(0)+" gram";

}

</script>

</main>

</body>
</html>
