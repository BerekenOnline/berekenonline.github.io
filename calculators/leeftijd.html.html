<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">

<title>Leeftijd Calculator</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>

<h1>Leeftijd Calculator</h1>

</header>

<main>

<input type="date" id="geboorte">

<button onclick="berekenLeeftijd()">Bereken</button>

<h2 id="leeftijd"></h2>

<script>

function berekenLeeftijd(){

let datum=new Date(document.getElementById("geboorte").value);

let vandaag=new Date();

let leeftijd=vandaag.getFullYear()-datum.getFullYear();

document.getElementById("leeftijd").innerHTML=

"Je bent ongeveer "+leeftijd+" jaar.";

}

</script>

</main>

</body>

</html>
